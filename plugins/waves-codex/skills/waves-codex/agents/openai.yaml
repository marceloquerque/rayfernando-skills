interface:
  display_name: "WAVES (Codex)"
  short_description: "WAVE = Workers, Aggregate, Verify, Extend. Fan out independent work to Codex subagents as a bounded wave, verify evidence, and synthesize structured handoffs."
  default_prompt: "Use waves-codex to discover the task shape, verify coverage, decompose into independent slices, spawn Codex subagents (a bounded wave), collect evidence-backed handoffs, verify important claims, and synthesize one deliverable."

policy:
  # Opt-in: a run spawns more agents than usual, so require explicit invocation
  # (mirrors disable-model-invocation: true in the SKILL.md frontmatter).
  allow_implicit_invocation: false
