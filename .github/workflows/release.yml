name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-skill-zip:
    name: Build skill zip and attach to release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill metadata
        run: python3 scripts/validate-skill-metadata.py

      - name: Build claude.ai-compatible zips
        run: |
          declare -A seen
          for skill_dir in plugins/*/skills/*; do
            name=$(basename "$skill_dir")
            if [[ -n "${seen[$name]:-}" ]]; then
              echo "ERROR: duplicate skill basename '$name' from '$skill_dir' and '${seen[$name]}'" >&2
              exit 1
            fi
            seen[$name]="$skill_dir"
            (cd "$(dirname "$skill_dir")" && zip -r "${GITHUB_WORKSPACE}/${name}.zip" "$name")
          done
          ls -la "${GITHUB_WORKSPACE}"/*.zip

      - name: Verify zip contents
        run: |
          for skill_dir in plugins/*/skills/*; do
            name=$(basename "$skill_dir")
            echo "== ${name}.zip =="
            unzip -l "${GITHUB_WORKSPACE}/${name}.zip"
            if ! unzip -l "${GITHUB_WORKSPACE}/${name}.zip" | grep -qF "${name}/SKILL.md"; then
              echo "${name}/SKILL.md missing from ${name}.zip" >&2
              exit 1
            fi
          done

      - name: Create GitHub Release with skill zips
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
          generate_release_notes: true
          body: |
            ## Install

            **Claude Code:**
            ```
            /plugin marketplace add RayFernando1337/rayfernando-skills@${{ github.ref_name }}
            /plugin install running-bug-review-board@rayfernando-skills
            /plugin install waves@rayfernando-skills
            /plugin install waves-codex@rayfernando-skills
            ```

            **claude.ai (Settings > Features > Skills):**
            Download the skill zip you want below (`running-bug-review-board.zip`, `waves.zip`, or `waves-codex.zip`) and upload it.

            **Cursor / Codex / Droid:** see the [README](https://github.com/RayFernando1337/rayfernando-skills#install) for current install instructions.

            ---
