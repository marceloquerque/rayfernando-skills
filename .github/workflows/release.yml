name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-skill-zip:
    name: Build skill zip and attach to release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill metadata
        run: python3 scripts/validate-skill-metadata.py

      - name: Build claude.ai-compatible zip
        run: |
          cd plugins/running-bug-review-board/skills
          zip -r "${GITHUB_WORKSPACE}/running-bug-review-board.zip" running-bug-review-board

      - name: Verify zip contents
        run: |
          unzip -l running-bug-review-board.zip
          python3 - <<'PY'
          from zipfile import ZipFile
          with ZipFile("running-bug-review-board.zip") as archive:
              if "running-bug-review-board/SKILL.md" not in archive.namelist():
                  raise SystemExit("running-bug-review-board/SKILL.md missing from zip")
          PY

      - name: Create GitHub Release with skill zip
        uses: softprops/action-gh-release@v2
        with:
          files: running-bug-review-board.zip
          generate_release_notes: true
          body: |
            ## Install

            **Claude Code:**
            ```
            /plugin marketplace add RayFernando1337/rayfernando-skills@${{ github.ref_name }}
            /plugin install running-bug-review-board@rayfernando-skills
            ```

            **claude.ai (Settings > Features > Skills):**
            Download `running-bug-review-board.zip` below and upload it.

            **Cursor / Codex / Droid:** see the [README](https://github.com/RayFernando1337/rayfernando-skills#install) for current install instructions.

            ---
